# =============================================
# Test Configuration
# =============================================
server.port=0

# H2 In-Memory Database for Tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# JWT Configuration
app.jwt.secret=TestSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm2024Testing
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000

# CORS
app.cors.allowed-origins=http://localhost:3000

# Auction Configuration
app.auction.min-bid-increment=1.00
app.auction.auto-extend-minutes=5
app.auction.snipe-protection-seconds=30

# File Upload
app.upload.dir=./test-uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Logging - minimal for tests
logging.level.com.auction=WARN
logging.level.org.hibernate.SQL=WARN

# Mail - disable for tests
spring.mail.host=localhost
spring.mail.port=25
