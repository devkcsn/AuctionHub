# ========================
# Server Configuration
# ========================
server.port=8080

# ========================
# H2 Database (Dev)
# ========================
spring.datasource.url=jdbc:h2:mem:auction_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ========================
# JWT Configuration
# ========================
app.jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLongForHS256Algorithm2024
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ========================
# CORS Configuration  
# ========================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ========================
# File Upload
# ========================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=./uploads

# ========================
# Auction Configuration
# ========================
app.auction.min-bid-increment=1.00
app.auction.auto-extend-minutes=5
app.auction.snipe-protection-seconds=30

# ========================
# Logging
# ========================
logging.level.com.auction=DEBUG
logging.level.org.springframework.web.socket=DEBUG
